filebeat.inputs:
  # Logs SIGER (Java) â€” varre todos os clientes/sequencias do diretÃ³rio raiz
  - type: filestream
    id: siger-java
    enabled: true
    paths:
      - /usr/share/logs/*/RLS/java/SIGER_*
      - /usr/share/logs/*/*/RLS/java/SIGER_*
    prospector.scanner.recursive_glob: false
    scan_frequency: 10s
    close.on_state_change.inactive: 5m
    harvester_limit: 500
    encoding: cp1252
    fields_under_root: true
    fields:
      topic: logs_siger_java
    parsers:
      - multiline:
          pattern: '^[[:alnum:]]{4} [[:alnum:]]{6} [[:alnum:]]{6} \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}\s\w+\s+\S+\s(\s+|Caused by:|<)'
          negate: false
          match: after

  # Logs SigerCrashReport â€” varre todos os clientes/sequencias do diretÃ³rio raiz
  - type: filestream
    id: siger-crash
    enabled: true
    paths:
      - /usr/share/logs/*/RLS/java/SigerCrashReport_*
      - /usr/share/logs/*/*/RLS/java/SigerCrashReport_*
    prospector.scanner.recursive_glob: false
    scan_frequency: 10s
    close.on_state_change.inactive: 5m
    harvester_limit: 500
    encoding: cp1252
    fields_under_root: true
    fields:
      topic: logs_siger_crash
    parsers:
      - multiline:
          pattern: '^[[:alnum:]]{4} [[:alnum:]]{6} [[:alnum:]]{6} \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}\s\w+\s+\S+\s(\s+|Caused by:|<)'
          negate: false
          match: after

# Processors globais â€” extrai client_id/sequence direto do path
# Cada dissect sÃ³ executa quando o regex garante casamento (evita 'dissect_parsing_error' em log.flags)
processors:
  # Caminho com sequencia: /usr/share/logs/<client_id>/<sequence>/RLS/java/<filename>
  - dissect:
      when:
        regexp:
          log.file.path: '^/usr/share/logs/[^/]+/[^/]+/RLS/java/[^/]+$'
      tokenizer: "/usr/share/logs/%{client_id}/%{sequence}/RLS/java/%{filename}"
      field: "log.file.path"
      target_prefix: ""
  # Caminho sem sequencia: /usr/share/logs/<client_id>/RLS/java/<filename>
  - dissect:
      when:
        regexp:
          log.file.path: '^/usr/share/logs/[^/]+/RLS/java/[^/]+$'
      tokenizer: "/usr/share/logs/%{client_id}/RLS/java/%{filename}"
      field: "log.file.path"
      target_prefix: ""
  # Garante que 'sequence' sempre exista (para paths sem segmento de sequencia)
  - add_fields:
      when:
        not:
          has_fields: ["sequence"]
      target: ""
      fields:
        sequence: "default"

# Fila interna maior â€” melhora batching para Kafka
queue.mem:
  events: 16384
  flush.min_events: 2048
  flush.timeout: 5s

# Desabilita a saÃ­da padrÃ£o para o Elasticsearch
output.elasticsearch:
  enabled: false

# SaÃ­da para Kafka â€” particiona por client_id para preservar ordem por cliente
output.kafka:
  enabled: true
  hosts:
    - broker:29092
    - broker2:29092
  topic: '%{[topic]}'
  key: '%{[client_id]}'
  required_acks: 1
  compression: lz4
  max_message_bytes: 1000000
  bulk_max_size: 4096
  partition.hash:
    reachable_only: true

# Logging mais enxuto para PoC
logging.level: info
logging.metrics.enabled: false
