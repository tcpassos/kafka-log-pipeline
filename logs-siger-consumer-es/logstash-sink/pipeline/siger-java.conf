input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP}"
    topics => ["logs_siger_java"]
    group_id => "logstash-elastic-siger-java"
    client_id => "logstash-siger-java"
    codec => json {
      charset => "CP1252"
    }
    consumer_threads => 6
    fetch_min_bytes => 65536
    auto_offset_reset => "earliest"
  }
}

filter {
  # Parsing posicional (10-20x mais rápido que grok)
  dissect {
    mapping => {
      "message" => "%{[log][session_id]} %{[log][sequence]} %{[log][thread_id]} %{ts_date} %{ts_time} %{[log][level]} %{[log][logger]} %{[log][message_full]}"
    }
    tag_on_failure => ["_dissectfailure"]
  }

  # Fallback para linhas atípicas: tenta extrair pelo menos timestamp + nível via grok permissivo
  if "_dissectfailure" in [tags] {
    grok {
      match => {
        "message" => "(?<ts_date>\d{4}-\d{2}-\d{2})[ T](?<ts_time>\d{2}:\d{2}:\d{2}[.,]\d{3})\s+(?<[log][level]>SEVERE|WARNING|INFO|CONFIG|FINE|FINER|FINEST)\b"
      }
      tag_on_failure => ["_grokfallbackfailure"]
    }
    mutate { add_tag => ["atypical_line"] }
  }

  # Extração condicional de erros (regex — mantém grok aqui)
  if [log][level] in ["SEVERE", "WARNING"] {
    grok {
      match => {
        "message" => [
          "(?m)(?<[error][type]>[\w\.]+(?:Exception|Error|Throwable)): %{GREEDYDATA:[error][message_only]}",
          "(?m)Caused by: (?<[error][type]>[\w\.]+(?:Exception|Error|Throwable))(: %{GREEDYDATA:[error][message_only]})?",
          "(?m)^(?<[error][type]>[\w\.]+(?:Exception|Error|Throwable))\s*$"
        ]
      }
      tag_on_failure => []
    }
  }

  # Converte timestamp do log para @timestamp
  if [ts_date] and [ts_time] {
    mutate { add_field => { "[log][timestamp_str]" => "%{ts_date} %{ts_time}" } }
    date {
      match => [ "[log][timestamp_str]", "YYYY-MM-dd HH:mm:ss,SSS" ]
      target => "@timestamp"
      timezone => "America/Sao_Paulo"
    }
  }

  # Substitui o message pelo conteúdo após o cabeçalho
  if [log][message_full] {
    mutate {
      strip => ["[log][message_full]"]
      replace => { "message" => "%{[log][message_full]}" }
    }
  }

  mutate {
    remove_field => [ "[log][message_full]", "[log][timestamp_str]", "[error][message_only]", "ts_date", "ts_time" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "java"
    data_stream_namespace => "siger"
  }
}
